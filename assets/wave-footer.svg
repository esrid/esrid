<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 130" preserveAspectRatio="none" width="100%">
  <defs>
    <linearGradient id="bloodbg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0D0000"/>
      <stop offset="25%"  stop-color="#5C0000"/>
      <stop offset="50%"  stop-color="#CC0000"/>
      <stop offset="75%"  stop-color="#7A0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </linearGradient>
    <linearGradient id="fwave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3D0000"/>
      <stop offset="40%"  stop-color="#AA0000"/>
      <stop offset="70%"  stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#3D0000"/>
    </linearGradient>
    <linearGradient id="fwave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#580000"/>
      <stop offset="50%"  stop-color="#E00000"/>
      <stop offset="100%" stop-color="#580000"/>
    </linearGradient>
    <linearGradient id="fwave3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B0000"/>
      <stop offset="50%"  stop-color="#FF1A1A"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1440" height="130" fill="url(#bloodbg2)"/>

  <!-- Wave layer 1 — deep blood (inverted) -->
  <path d="M0,70 C240,110 480,30 720,70 C960,110 1200,40 1440,75 L1440,0 L0,0 Z"
        fill="url(#fwave1)" opacity="0.9"/>

  <!-- Wave layer 2 — mid blood -->
  <path d="M0,55 C180,90 420,20 660,60 C900,100 1140,30 1440,58 L1440,0 L0,0 Z"
        fill="url(#fwave2)" opacity="0.7"/>

  <!-- Wave layer 3 — fresh blood highlight -->
  <path d="M0,40 C300,65 560,10 820,45 C1080,80 1300,20 1440,42 L1440,0 L0,0 Z"
        fill="url(#fwave3)" opacity="0.5"/>
</svg>
