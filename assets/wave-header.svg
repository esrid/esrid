<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 130" preserveAspectRatio="none" width="100%">
  <defs>
    <linearGradient id="bloodbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0D0000"/>
      <stop offset="25%"  stop-color="#5C0000"/>
      <stop offset="50%"  stop-color="#CC0000"/>
      <stop offset="75%"  stop-color="#7A0000"/>
      <stop offset="100%" stop-color="#0D0000"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3D0000"/>
      <stop offset="40%"  stop-color="#AA0000"/>
      <stop offset="70%"  stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#3D0000"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#580000"/>
      <stop offset="50%"  stop-color="#E00000"/>
      <stop offset="100%" stop-color="#580000"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B0000"/>
      <stop offset="50%"  stop-color="#FF1A1A"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1440" height="130" fill="url(#bloodbg)"/>

  <!-- Wave layer 1 — deep blood -->
  <path d="M0,60 C240,20 480,100 720,60 C960,20 1200,90 1440,55 L1440,130 L0,130 Z"
        fill="url(#wave1)" opacity="0.9"/>

  <!-- Wave layer 2 — mid blood -->
  <path d="M0,75 C180,40 420,110 660,70 C900,30 1140,100 1440,72 L1440,130 L0,130 Z"
        fill="url(#wave2)" opacity="0.7"/>

  <!-- Wave layer 3 — fresh blood highlight -->
  <path d="M0,90 C300,65 560,120 820,85 C1080,50 1300,110 1440,88 L1440,130 L0,130 Z"
        fill="url(#wave3)" opacity="0.5"/>
</svg>
